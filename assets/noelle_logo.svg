<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>

    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="65%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <filter id="rayGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="coreFilter" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="octGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)"/>

  <!-- Center: cx=400, cy=210 -->

  <!-- ===================== -->
  <!-- NESTED OCTAGONS       -->
  <!-- Innermost bright, fading outward -->
  <!-- r=18 -->
  <polygon points="400,192 412.7,196.7 417,210 412.7,223.3 400,228 387.3,223.3 383,210 387.3,196.7"
    fill="none" stroke="#ffffff" stroke-width="1.3" opacity="0.75" filter="url(#octGlow)"/>
  <!-- r=34 -->
  <polygon points="400,176 424.0,186.0 434,210 424.0,234.0 400,244 376.0,234.0 366,210 376.0,186.0"
    fill="none" stroke="#ffffff" stroke-width="1.4" opacity="0.70" filter="url(#octGlow)"/>
  <!-- r=52 -->
  <polygon points="400,158 436.8,174.8 452,210 436.8,245.2 400,262 363.2,245.2 348,210 363.2,174.8"
    fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.65" filter="url(#octGlow)"/>
  <!-- r=70 -->
  <polygon points="400,140 449.5,163.5 470,210 449.5,256.5 400,280 350.5,256.5 330,210 350.5,163.5"
    fill="none" stroke="#ffffff" stroke-width="1.6" opacity="0.58" filter="url(#octGlow)"/>
  <!-- r=88 -->
  <polygon points="400,122 462.2,152.2 488,210 462.2,267.8 400,298 337.8,267.8 312,210 337.8,152.2"
    fill="none" stroke="#cccccc" stroke-width="1.6" opacity="0.48" filter="url(#octGlow)"/>
  <!-- r=106 -->
  <polygon points="400,104 474.9,141.0 506,210 474.9,279.0 400,316 325.1,279.0 294,210 325.1,141.0"
    fill="none" stroke="#aaaaaa" stroke-width="1.5" opacity="0.38" filter="url(#octGlow)"/>
  <!-- r=122 -->
  <polygon points="400,88 486.3,130.3 522,210 486.3,289.7 400,332 313.7,289.7 278,210 313.7,130.3"
    fill="none" stroke="#888888" stroke-width="1.3" opacity="0.28"/>
  <!-- r=136 outermost subtle -->
  <polygon points="400,74 496.1,121.1 536,210 496.1,298.9 400,346 303.9,298.9 264,210 303.9,121.1"
    fill="none" stroke="#555555" stroke-width="1.1" opacity="0.20"/>

  <!-- ===================== -->
  <!-- 8 RAYS                -->
  <!-- Cardinal rays -->
  <line x1="400" y1="210" x2="400" y2="42" stroke="#ffffff" stroke-width="2.6" opacity="0.90" filter="url(#rayGlow)"/>
  <line x1="400" y1="210" x2="400" y2="378" stroke="#ffffff" stroke-width="2.6" opacity="0.90" filter="url(#rayGlow)"/>
  <line x1="400" y1="210" x2="232" y2="210" stroke="#ffffff" stroke-width="2.6" opacity="0.90" filter="url(#rayGlow)"/>
  <line x1="400" y1="210" x2="568" y2="210" stroke="#ffffff" stroke-width="2.6" opacity="0.90" filter="url(#rayGlow)"/>
  <!-- Diagonal rays slightly thinner -->
  <line x1="400" y1="210" x2="505" y2="105" stroke="#ffffff" stroke-width="2.0" opacity="0.75" filter="url(#rayGlow)"/>
  <line x1="400" y1="210" x2="295" y2="105" stroke="#ffffff" stroke-width="2.0" opacity="0.75" filter="url(#rayGlow)"/>
  <line x1="400" y1="210" x2="505" y2="315" stroke="#ffffff" stroke-width="2.0" opacity="0.75" filter="url(#rayGlow)"/>
  <line x1="400" y1="210" x2="295" y2="315" stroke="#ffffff" stroke-width="2.0" opacity="0.75" filter="url(#rayGlow)"/>

  <!-- ===================== -->
  <!-- ENDPOINT NODES        -->
  <!-- Top + Bottom — slightly brighter to replace violet contrast -->
  <circle cx="400" cy="42" r="10" fill="#111111" stroke="#ffffff" stroke-width="3.0" filter="url(#nodeGlow)"/>
  <circle cx="400" cy="378" r="10" fill="#111111" stroke="#ffffff" stroke-width="3.0" filter="url(#nodeGlow)"/>
  <!-- Left + Right — standard -->
  <circle cx="232" cy="210" r="10" fill="#111111" stroke="#dddddd" stroke-width="2.6" filter="url(#nodeGlow)"/>
  <circle cx="568" cy="210" r="10" fill="#111111" stroke="#dddddd" stroke-width="2.6" filter="url(#nodeGlow)"/>
  <!-- Diagonals — slightly dimmer -->
  <circle cx="505" cy="105" r="8" fill="#111111" stroke="#bbbbbb" stroke-width="2.2" filter="url(#nodeGlow)"/>
  <circle cx="295" cy="105" r="8" fill="#111111" stroke="#bbbbbb" stroke-width="2.2" filter="url(#nodeGlow)"/>
  <circle cx="505" cy="315" r="8" fill="#111111" stroke="#bbbbbb" stroke-width="2.2" filter="url(#nodeGlow)"/>
  <circle cx="295" cy="315" r="8" fill="#111111" stroke="#bbbbbb" stroke-width="2.2" filter="url(#nodeGlow)"/>

  <!-- ===================== -->
  <!-- GLOWING CORE          -->
  <circle cx="400" cy="210" r="55" fill="url(#coreGlow)" opacity="0.20"/>
  <circle cx="400" cy="210" r="28" fill="#ffffff" opacity="0.10" filter="url(#coreFilter)"/>
  <circle cx="400" cy="210" r="13" fill="url(#coreGlow)" filter="url(#coreFilter)"/>
  <circle cx="400" cy="210" r="5" fill="#ffffff" opacity="1"/>

</svg>
